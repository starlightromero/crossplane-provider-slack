apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-slack-usergroup
  annotations:
    meta.crossplane.io/maintainer: Avodah Inc <engineering@avodah.io>
    meta.crossplane.io/source: https://github.com/avodah-inc/crossplane-provider-slack
    meta.crossplane.io/description: Crossplane provider for Slack user groups and membership
spec:
  controller:
    image: ghcr.io/starlightromero/provider-slack-usergroup:latest
  crossplane:
    version: ">=v2.0.0"
  capabilities:
    - safe-start
  dependsOn:
    - provider: ghcr.io/starlightromero/provider-family-slack
      version: ">=v0.1.0"
