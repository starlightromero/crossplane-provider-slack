name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.26"
  FAMILY_IMAGE: ghcr.io/starlightromero/provider-family-slack
  CONVERSATION_IMAGE: ghcr.io/starlightromero/provider-slack-conversation
  USERGROUP_IMAGE: ghcr.io/starlightromero/provider-slack-usergroup

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      new-release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new-release == 'true'
    strategy:
      matrix:
        include:
          - image: ghcr.io/starlightromero/provider-family-slack
            dockerfile: Dockerfile.family
          - image: ghcr.io/starlightromero/provider-slack-conversation
            dockerfile: Dockerfile.conversation
          - image: ghcr.io/starlightromero/provider-slack-usergroup
            dockerfile: Dockerfile.usergroup
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.semantic-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.semantic-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.semantic-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package:
    name: Build & Push Crossplane Packages
    runs-on: ubuntu-latest
    needs: [semantic-release, build-push]
    if: needs.semantic-release.outputs.new-release == 'true'
    strategy:
      matrix:
        include:
          - name: family-slack
            image: ghcr.io/starlightromero/provider-family-slack
            package-root: package/family
          - name: slack-conversation
            image: ghcr.io/starlightromero/provider-slack-conversation
            package-root: package/conversation
          - name: slack-usergroup
            image: ghcr.io/starlightromero/provider-slack-usergroup
            package-root: package/usergroup
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Pull runtime image
        run: docker pull ${{ matrix.image }}:${{ needs.semantic-release.outputs.version }}

      - name: Build Crossplane package
        run: |
          crossplane xpkg build \
            --package-root=${{ matrix.package-root }} \
            --embed-runtime-image=${{ matrix.image }}:${{ needs.semantic-release.outputs.version }} \
            -o provider-${{ matrix.name }}-v${{ needs.semantic-release.outputs.version }}.xpkg

      - name: Push Crossplane package
        run: |
          crossplane xpkg push \
            ${{ matrix.image }}:${{ needs.semantic-release.outputs.version }} \
            -f provider-${{ matrix.name }}-v${{ needs.semantic-release.outputs.version }}.xpkg

      - name: Generate package SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ needs.semantic-release.outputs.version }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.semantic-release.outputs.tag }}
          files: |
            provider-${{ matrix.name }}-v${{ needs.semantic-release.outputs.version }}.xpkg
            sbom-${{ matrix.name }}.cdx.json
